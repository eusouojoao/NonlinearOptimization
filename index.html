<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ONL Notes Viewer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <style>
        :root { color-scheme: light dark; }
        body { 
            background: Canvas; color: CanvasText; 
            font-family: system-ui, sans-serif; margin: 0; 
            display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }
        #controls { 
            padding: 10px; display: flex; justify-content: center; 
            align-items: center; gap: 1.5rem; border-bottom: 1px solid ButtonBorder; 
            background: Canvas; z-index: 10;
        }
        .view-container { flex: 1; display: flex; justify-content: center; align-items: center; overflow: auto; padding: 10px; }
        .spread { display: flex; gap: 5px; align-items: center; }
        canvas { background: white; max-height: 85vh; width: auto; border: 1px solid ButtonBorder; }
        button { padding: 6px 14px; cursor: pointer; font-size: 0.9rem; }
        #page_info { font-size: 0.9rem; min-width: 100px; text-align: center; }
        #loading { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); font-weight: bold; }
    </style>
</head>
<body>

<div id="loading">Loading PDF...</div>

<nav id="controls">
    <button id="prev" disabled>Backward</button>
    <div id="page_info">Page <span id="page_num">1</span> / <span id="page_count">-</span></div>
    <button id="next" disabled>Forward</button>
</nav>

<main class="view-container">
    <div class="spread">
        <canvas id="left-canvas"></canvas>
        <canvas id="right-canvas"></canvas>
    </div>
</main>

<script>
    const url = 'notes/ONL-notes.pdf'; 

    const pdfjsLib = window['pdfjs-dist/build/pdf'];
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

    let pdfDoc = null, pageNum = 1;

    async function renderPage(num, canvasId) {
        const canvas = document.getElementById(canvasId);
        const ctx = canvas.getContext('2d');
        if (num < 1 || num > pdfDoc.numPages) {
            canvas.style.display = 'none';
            return;
        }
        canvas.style.display = 'block';
        const page = await pdfDoc.getPage(num);
        const viewport = page.getViewport({ scale: 1.5 });
        canvas.height = viewport.height;
        canvas.width = viewport.width;
        await page.render({ canvasContext: ctx, viewport: viewport }).promise;
    }

    async function update() {
        const isLast = pageNum >= pdfDoc.numPages;
        document.getElementById('page_num').textContent = isLast ? pageNum : `${pageNum}-${pageNum + 1}`;
        document.getElementById('prev').disabled = (pageNum <= 1);
        document.getElementById('next').disabled = (pageNum + 1 >= pdfDoc.numPages);
        
        await Promise.all([
            renderPage(pageNum, 'left-canvas'),
            renderPage(pageNum + 1, 'right-canvas')
        ]);
    }

    document.getElementById('prev').onclick = () => { pageNum = Math.max(1, pageNum - 2); update(); };
    document.getElementById('next').onclick = () => { if (pageNum + 2 <= pdfDoc.numPages) { pageNum += 2; update(); } };

    window.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowLeft') document.getElementById('prev').click();
        if (e.key === 'ArrowRight') document.getElementById('next').click();
    });

    pdfjsLib.getDocument(url).promise.then(doc => {
        pdfDoc = doc;
        document.getElementById('loading').style.display = 'none';
        document.getElementById('page_count').textContent = doc.numPages;
        update();
    }).catch(err => {
        document.getElementById('loading').style.display = 'none';
        document.body.innerHTML = `<div style="padding:20px;"><h2>Error</h2><p>${err.message}</p></div>`;
    });
</script>
</body>
</html>
