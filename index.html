<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>PDF Viewer</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf_viewer.min.css" />
  <style>
    :root {
      color-scheme: light dark;
      --ui-f: system-ui, sans-serif;
      --spread-gap: 16px;
      --viewer-pad: 20px;

      --ctl-h: 32px;
      --ctl-r: 8px;
      --ctl-font: 13px;
      --zoom-btn-w: 32px;
      --zoom-field-w: 58px;
    }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
    }

    body {
      background: Canvas;
      color: CanvasText;
      font-family: var(--ui-f);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    body.light { color-scheme: light; }
    body.dark { color-scheme: dark; }

    #desktopOnlyMessage {
      display: none;
      height: 100vh;
      width: 100vw;
      box-sizing: border-box;
      padding: 24px;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-size: 16px;
      background: Canvas;
      color: CanvasText;
    }

    #app {
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #toolbar {
      height: 44px;
      display: flex;
      align-items: center;
      padding: 0 12px;
      background: Canvas;
      border-bottom: 1px solid ButtonBorder;
      z-index: 10;
      flex-shrink: 0;
    }

    .section {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 1;
      min-width: 0;
    }

    .center { justify-content: center; }
    .right { justify-content: flex-end; }

    .brand {
      font-weight: 700;
      font-size: 13px;
      white-space: nowrap;
    }

    .sep {
      width: 1px;
      height: 20px;
      background: ButtonBorder;
      margin: 0 4px;
    }

    button,
    .download-link {
      background: ButtonFace;
      color: ButtonText;
      border: 1px solid ButtonBorder;
      border-radius: var(--ctl-r);
      height: var(--ctl-h);
      cursor: pointer;
      font-size: var(--ctl-font);
      padding: 0 12px;
      font-family: inherit;
      white-space: nowrap;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      box-sizing: border-box;
      text-decoration: none;
    }

    button:hover,
    .download-link:hover {
      filter: brightness(1.03);
    }

    .zoom-control {
      display: inline-flex;
      align-items: stretch;
      height: var(--ctl-h);
      border: 1px solid ButtonBorder;
      border-radius: var(--ctl-r);
      overflow: hidden;
      background: Field;
    }

    .zoom-control button {
      border: 0;
      border-radius: 0;
      height: 100%;
      min-width: var(--zoom-btn-w);
      width: var(--zoom-btn-w);
      padding: 0;
      font-size: 16px;
      font-weight: 600;
      background: ButtonFace;
      line-height: 1;
    }

    .zoom-control button + button,
    .zoom-display + button,
    .zoom-control button + .zoom-display,
    .zoom-display {
      border-left: 1px solid ButtonBorder;
    }

    .zoom-display {
      width: var(--zoom-field-w);
      min-width: var(--zoom-field-w);
      height: 100%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      position: relative;
      background: Field;
      box-sizing: border-box;
    }

    #zoomInput {
      width: 100%;
      height: 100%;
      border: 0;
      outline: none;
      background: transparent;
      color: CanvasText;
      text-align: center;
      font-size: var(--ctl-font);
      font-family: inherit;
      padding: 0 18px 0 8px;
      box-sizing: border-box;
      appearance: textfield;
      -moz-appearance: textfield;
    }

    #zoomInput::-webkit-outer-spin-button,
    #zoomInput::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    .zoom-suffix {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 12px;
      opacity: 0.8;
      pointer-events: none;
    }

    #viewerContainer {
      flex: 1;
      overflow: auto;
      position: relative;
      background: Field;
      padding: var(--viewer-pad);
      box-sizing: border-box;
      overscroll-behavior: contain;
    }

    #viewer {
      height: 100%;
      display: grid;
      place-items: center;
      position: relative;
      overflow: hidden;
    }

    .spread-stage {
      position: relative;
      display: grid;
      place-items: center;
    }

    .spread {
      display: inline-flex;
      align-items: flex-start;
      justify-content: flex-start;
      gap: var(--spread-gap);
      width: auto;
      margin: 0;
      will-change: transform, opacity;
    }

    .spread.animating {
      position: absolute;
      inset: auto;
    }

    .spread.enter-from-right {
      animation: spreadEnterFromRight 320ms cubic-bezier(0.22, 0.8, 0.2, 1) forwards;
    }

    .spread.exit-to-left {
      animation: spreadExitToLeft 320ms cubic-bezier(0.22, 0.8, 0.2, 1) forwards;
    }

    .spread.enter-from-left {
      animation: spreadEnterFromLeft 320ms cubic-bezier(0.22, 0.8, 0.2, 1) forwards;
    }

    .spread.exit-to-right {
      animation: spreadExitToRight 320ms cubic-bezier(0.22, 0.8, 0.2, 1) forwards;
    }

    @keyframes spreadEnterFromRight {
      from {
        opacity: 0;
        transform: translateX(56px) scale(0.985);
      }
      to {
        opacity: 1;
        transform: translateX(0) scale(1);
      }
    }

    @keyframes spreadExitToLeft {
      from {
        opacity: 1;
        transform: translateX(0) scale(1);
      }
      to {
        opacity: 0;
        transform: translateX(-56px) scale(0.985);
      }
    }

    @keyframes spreadEnterFromLeft {
      from {
        opacity: 0;
        transform: translateX(-56px) scale(0.985);
      }
      to {
        opacity: 1;
        transform: translateX(0) scale(1);
      }
    }

    @keyframes spreadExitToRight {
      from {
        opacity: 1;
        transform: translateX(0) scale(1);
      }
      to {
        opacity: 0;
        transform: translateX(56px) scale(0.985);
      }
    }

    .page {
      position: relative;
      background: white;
      border: none !important;
      box-shadow: 0 0 12px rgba(0, 0, 0, 0.2);
      flex: 0 0 auto;
      transform: translateZ(0);
    }

    canvas {
      display: block;
    }

    .textLayer,
    .annotationLayer {
      position: absolute;
      inset: 0;
      overflow: hidden;
    }

    .textLayer {
      opacity: 1;
      line-height: 1;
      z-index: 2;
      user-select: text;
      -webkit-user-select: text;
      pointer-events: auto;
    }

    .textLayer span,
    .textLayer br {
      cursor: text;
    }

    .annotationLayer {
      z-index: 3;
      pointer-events: none;
    }

    .annotationLayer a {
      position: absolute;
      display: block;
      cursor: pointer;
      background: transparent;
      text-decoration: none;
      pointer-events: auto;
    }

    @media (max-width: 1024px), (pointer: coarse) {
      #app {
        display: none !important;
      }

      #desktopOnlyMessage {
        display: flex !important;
      }
    }
  </style>
</head>
<body>
  <div id="desktopOnlyMessage">
    This PDF viewer is available on desktop only.
  </div>

  <div id="app">
    <nav id="toolbar">
      <div class="section">
        <span class="brand">PDF VIEWER</span>
        <div class="sep"></div>
        <button id="themeToggle">Switch Theme</button>
      </div>

      <div class="section center">
        <button id="prev">Backward</button>
        <span id="page_info" style="font-size:13px; min-width:90px; text-align:center;">1-2 / -</span>
        <button id="next">Forward</button>
      </div>

      <div class="section right">
        <div class="zoom-control" aria-label="Zoom controls">
          <button id="zoomOut" type="button" aria-label="Zoom out">−</button>
          <div class="zoom-display">
            <input type="text" id="zoomInput" value="100" autocomplete="off" inputmode="numeric" aria-label="Zoom percentage" />
            <span class="zoom-suffix">%</span>
          </div>
          <button id="zoomIn" type="button" aria-label="Zoom in">+</button>
        </div>
        <div class="sep"></div>
        <button id="fit">Fit Height</button>
        <div class="sep"></div>
        <a id="downloadBtn" class="download-link" href="notes/ONL-notes.pdf" download>Download</a>
      </div>
    </nav>

    <div id="viewerContainer">
      <div id="viewer" class="pdfViewer"></div>
    </div>
  </div>

  <script>
    const url = "notes/ONL-notes.pdf";
    const pdfjsLib = window["pdfjs-dist/build/pdf"];
    pdfjsLib.GlobalWorkerOptions.workerSrc =
      "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js";

    const isDesktop = window.matchMedia("(min-width: 1025px) and (pointer: fine)").matches;

    let pdfDoc = null;
    let pageNum = 1;
    let scale = 1.0; // requested scale
    let renderToken = 0;
    let resizeTimer = null;

    const MIN_SCALE = 0.1;
    const MAX_SCALE = 5.0;
    const ZOOM_STEP_BUTTON = 0.1;
    const ZOOM_FACTOR_WHEEL = 1.1;

    function clamp(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    function normalizeSpreadStart(n) {
      const safe = Math.max(1, Math.min(n, pdfDoc ? pdfDoc.numPages : n));
      return safe % 2 === 0 ? safe - 1 : safe;
    }

    function getSpreadPages(startPage) {
      const left = startPage;
      const right = startPage + 1 <= pdfDoc.numPages ? startPage + 1 : null;
      return [left, right];
    }

    function getRenderedScale() {
      return scale;
    }

    async function renderPageInto(container, pageNumber, token) {
      const page = await pdfDoc.getPage(pageNumber);
      if (token !== renderToken) return;

      const renderScale = getRenderedScale();
      const viewport = page.getViewport({ scale: renderScale });

      const width = Math.round(viewport.width);
      const height = Math.round(viewport.height);

      const pageDiv = document.createElement("div");
      pageDiv.className = "page";
      pageDiv.style.width = `${width}px`;
      pageDiv.style.height = `${height}px`;
      container.appendChild(pageDiv);

      const outputScale = window.devicePixelRatio || 1;

      const canvas = document.createElement("canvas");
      const context = canvas.getContext("2d", { alpha: false });

      canvas.width = Math.round(width * outputScale);
      canvas.height = Math.round(height * outputScale);
      canvas.style.width = `${width}px`;
      canvas.style.height = `${height}px`;

      pageDiv.appendChild(canvas);

      const transform = outputScale !== 1
        ? [outputScale, 0, 0, outputScale, 0, 0]
        : null;

      await page.render({
        canvasContext: context,
        viewport,
        transform,
        intent: "display"
      }).promise;
      if (token !== renderToken) return;

      const textLayer = document.createElement("div");
      textLayer.className = "textLayer";
      textLayer.style.width = `${width}px`;
      textLayer.style.height = `${height}px`;
      pageDiv.appendChild(textLayer);

      const textContent = await page.getTextContent();
      if (token !== renderToken) return;

      await pdfjsLib.renderTextLayer({
        textContent,
        container: textLayer,
        viewport,
        textDivs: []
      }).promise;
      if (token !== renderToken) return;

      const annotationLayer = document.createElement("div");
      annotationLayer.className = "annotationLayer";
      annotationLayer.style.width = `${width}px`;
      annotationLayer.style.height = `${height}px`;
      pageDiv.appendChild(annotationLayer);

      const annotations = await page.getAnnotations();
      if (token !== renderToken) return;

      for (const annotation of annotations) {
        if (annotation.subtype !== "Link") continue;
        if (!annotation.rect) continue;

        const rect = pdfjsLib.Util.normalizeRect(
          viewport.convertToViewportRectangle(annotation.rect)
        );

        const [left, top, right, bottom] = rect;
        const linkWidth = right - left;
        const linkHeight = bottom - top;

        if (linkWidth <= 0 || linkHeight <= 0) continue;

        const link = document.createElement("a");
        link.style.left = `${left}px`;
        link.style.top = `${top}px`;
        link.style.width = `${linkWidth}px`;
        link.style.height = `${linkHeight}px`;

        if (annotation.url) {
          link.href = annotation.url;
          link.target = "_blank";
          link.rel = "noopener noreferrer";
          link.title = annotation.url;
        } else if (annotation.dest) {
          link.href = "#";
          link.addEventListener("click", async (e) => {
            e.preventDefault();
            try {
              const destArray =
                typeof annotation.dest === "string"
                  ? await pdfDoc.getDestination(annotation.dest)
                  : annotation.dest;

              if (!destArray) return;

              const destRef = destArray[0];
              const targetIndex = await pdfDoc.getPageIndex(destRef);
              pageNum = normalizeSpreadStart(targetIndex + 1);
              updateUI(false);
            } catch (err) {
              console.error("Failed to navigate to PDF destination:", err);
            }
          });
        } else {
          continue;
        }

        annotationLayer.appendChild(link);
      }
    }

    let currentSpreadEl = null;
    let navDirection = "forward"; // "forward" or "backward"

    async function buildSpreadElement(token) {
      pageNum = normalizeSpreadStart(pageNum);
      const [leftPage, rightPage] = getSpreadPages(pageNum);

      const spread = document.createElement("div");
      spread.className = "spread";

      await renderPageInto(spread, leftPage, token);
      if (token !== renderToken) return null;

      if (rightPage) {
        await renderPageInto(spread, rightPage, token);
        if (token !== renderToken) return null;
      }

      return spread;
    }

    async function render(animate = true) {
      if (!pdfDoc || !isDesktop) return;

      const token = ++renderToken;
      const viewer = document.getElementById("viewer");

      let stage = viewer.querySelector(".spread-stage");
      if (!stage) {
        stage = document.createElement("div");
        stage.className = "spread-stage";
        viewer.innerHTML = "";
        viewer.appendChild(stage);
      }

      const newSpread = await buildSpreadElement(token);
      if (!newSpread || token !== renderToken) return;

      if (!animate || !currentSpreadEl) {
        stage.innerHTML = "";
        stage.appendChild(newSpread);
        currentSpreadEl = newSpread;
        return;
      }

      const oldSpread = currentSpreadEl;
      oldSpread.classList.add("animating");
      newSpread.classList.add("animating");

      if (navDirection === "forward") {
        oldSpread.classList.add("exit-to-left");
        newSpread.classList.add("enter-from-right");
      } else {
        oldSpread.classList.add("exit-to-right");
        newSpread.classList.add("enter-from-left");
      }

      stage.appendChild(newSpread);

      const finish = () => {
        if (oldSpread.parentNode) oldSpread.remove();
        newSpread.classList.remove(
          "animating",
          "enter-from-right",
          "enter-from-left",
          "exit-to-left",
          "exit-to-right"
        );
        currentSpreadEl = newSpread;
      };

      newSpread.addEventListener("animationend", finish, { once: true });
    }

    async function fitSpread() {
      if (!pdfDoc || !isDesktop) return;

      pageNum = normalizeSpreadStart(pageNum);
      const [leftPage, rightPage] = getSpreadPages(pageNum);

      const firstPage = await pdfDoc.getPage(leftPage);
      const baseViewport = firstPage.getViewport({ scale: 1 });

      const viewerContainer = document.getElementById("viewerContainer");
      const styles = getComputedStyle(document.documentElement);
      const gap = parseFloat(styles.getPropertyValue("--spread-gap")) || 16;
      const pad = parseFloat(styles.getPropertyValue("--viewer-pad")) || 20;

      const SHADOW_ALLOWANCE = 14;

      const availableWidth = Math.max(0, viewerContainer.clientWidth - pad * 2 - SHADOW_ALLOWANCE);
      const availableHeight = Math.max(0, viewerContainer.clientHeight - pad * 2 - SHADOW_ALLOWANCE);

      const pageWidth = baseViewport.width;
      const pageHeight = baseViewport.height;
      const pagesInSpread = rightPage ? 2 : 1;

      const spreadWidthAtScale1 = (pageWidth * pagesInSpread) + (rightPage ? gap : 0);
      const spreadHeightAtScale1 = pageHeight;

      const rawFitScale = Math.min(
        availableWidth / spreadWidthAtScale1,
        availableHeight / spreadHeightAtScale1
      );

      scale = clamp(rawFitScale, MIN_SCALE, MAX_SCALE);
      updateUI(false);
    }

    function updateUI(animate = true) {
      if (!pdfDoc || !isDesktop) return;

      pageNum = normalizeSpreadStart(pageNum);
      const [leftPage, rightPage] = getSpreadPages(pageNum);

      document.getElementById("page_info").textContent = rightPage
        ? `${leftPage}-${rightPage} / ${pdfDoc.numPages}`
        : `${leftPage} / ${pdfDoc.numPages}`;

      document.getElementById("zoomInput").value = Math.round(scale * 100);
      render(animate);
    }

    function setScaleAroundPoint(newScale, clientX, clientY) {
      const viewerContainer = document.getElementById("viewerContainer");
      const rect = viewerContainer.getBoundingClientRect();

      const pointX = clientX - rect.left + viewerContainer.scrollLeft;
      const pointY = clientY - rect.top + viewerContainer.scrollTop;

      const oldRenderedScale = getRenderedScale();
      scale = clamp(newScale, MIN_SCALE, MAX_SCALE);
      const newRenderedScale = getRenderedScale();
      const appliedScale = newRenderedScale / oldRenderedScale;

      updateUI(false);

      requestAnimationFrame(() => {
        viewerContainer.scrollLeft = (pointX * appliedScale) - (clientX - rect.left);
        viewerContainer.scrollTop = (pointY * appliedScale) - (clientY - rect.top);
      });
    }

    document.getElementById("themeToggle").onclick = () => {
      const body = document.body;
      body.className = body.classList.contains("dark") ? "light" : "dark";
    };

    document.getElementById("prev").onclick = () => {
      if (!pdfDoc) return;
      if (pageNum > 1) {
        navDirection = "backward";
        pageNum = Math.max(1, pageNum - 2);
        updateUI(true);
      }
    };

    document.getElementById("next").onclick = () => {
      if (!pdfDoc) return;
      const nextStart = pageNum + 2;
      if (nextStart <= pdfDoc.numPages) {
        navDirection = "forward";
        pageNum = nextStart;
        updateUI(true);
      }
    };

    document.getElementById("zoomIn").onclick = () => {
      scale = clamp(scale + ZOOM_STEP_BUTTON, MIN_SCALE, MAX_SCALE);
      updateUI(false);
    };

    document.getElementById("zoomOut").onclick = () => {
      scale = clamp(scale - ZOOM_STEP_BUTTON, MIN_SCALE, MAX_SCALE);
      updateUI(false);
    };

    document.getElementById("fit").onclick = async () => {
      await fitSpread();
    };

    document.getElementById("zoomInput").onkeydown = (e) => {
      if (e.key === "Enter") {
        const val = parseFloat(e.target.value) / 100;
        if (val > 0) {
          scale = clamp(val, MIN_SCALE, MAX_SCALE);
          updateUI(false);
          e.target.blur();
        }
      }
    };

    window.onkeydown = (e) => {
      if (!isDesktop) return;
      if (e.key === "ArrowLeft") document.getElementById("prev").click();
      if (e.key === "ArrowRight") document.getElementById("next").click();
    };

    window.addEventListener("resize", () => {
      if (!isDesktop || !pdfDoc) return;
      if (document.activeElement === document.getElementById("zoomInput")) return;

      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => {
        fitSpread();
      }, 80);
    });

    const viewerContainer = document.getElementById("viewerContainer");

    viewerContainer.addEventListener("wheel", (e) => {
      if (!isDesktop || !pdfDoc) return;

      if (e.ctrlKey || e.metaKey) {
        e.preventDefault();

        const zoomIn = e.deltaY < 0;
        const factor = zoomIn ? ZOOM_FACTOR_WHEEL : 1 / ZOOM_FACTOR_WHEEL;
        const newScale = scale * factor;

        setScaleAroundPoint(newScale, e.clientX, e.clientY);
      }
    }, { passive: false });

    if (isDesktop) {
      pdfjsLib.getDocument(url).promise.then((doc) => {
        pdfDoc = doc;
        pageNum = 1;
        fitSpread();
      }).catch((err) => {
        console.error("Failed to load PDF:", err);
      });
    }
  </script>
</body>
</html>
